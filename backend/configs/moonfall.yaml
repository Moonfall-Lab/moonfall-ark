game_id: moonfall_mvp
schema_version: "1.0"
mode: ffa

flow:
  # MVP 六阶段回合：摸牌 → 指挥 → 行动 → 对抗 → 月球 → 结算
  phases:
    - draw
    - command
    - action
    - combat
    - moon
    - resolve
  initial_phase: action

global:
  moon_rage: 0

moon_tiers:
  sleep: [0, 24]
  alert: [25, 49]
  anger: [50, 79]
  endgame: [80, 100]

vars:
  faction:
    fuel: 0
    ship_hp: 3
    shield: 0
    jammed: 0
    declaring_launch: 0
    launched: 0
    crashed: 0

factions:
  - id: pa
    name: Pioneer A
    players: [p1]
  - id: pb
    name: Pioneer B
    players: [p2]
  - id: pc
    name: Pioneer C
    players: [p3]
  - id: pd
    name: Pioneer D
    players: [p4]

units:
  # 每台小车初始停在自己阵营的飞船角
  - id: r1
    faction: pa
    kind: rover
    pose: { x: 1.0, y: 1.0, theta: 0.79 }
    status: idle
    carrying:
  - id: r2
    faction: pb
    kind: rover
    pose: { x: 11.0, y: 1.0, theta: 2.36 }
    status: idle
    carrying:
  - id: r3
    faction: pc
    kind: rover
    pose: { x: 1.0, y: 11.0, theta: -0.79 }
    status: idle
    carrying:
  - id: r4
    faction: pd
    kind: rover
    pose: { x: 11.0, y: 11.0, theta: -2.36 }
    status: idle
    carrying:

map:
  grid: [12, 12]
  zones:
    # 四角飞船基地
    - { id: ship_a, kind: base, name: 飞船 A, center: [1, 1], active: true, intensity: 1.0 }
    - { id: ship_b, kind: base, name: 飞船 B, center: [11, 1], active: true, intensity: 1.0 }
    - { id: ship_c, kind: base, name: 飞船 C, center: [1, 11], active: true, intensity: 1.0 }
    - { id: ship_d, kind: base, name: 飞船 D, center: [11, 11], active: true, intensity: 1.0 }
    # 普通资源区，采集返回 +1 燃料，初始 5 块
    - { id: resource_left, kind: resource, name: 西侧资源区, center: [3, 6], active: true, intensity: 1.0, yield: 1, stock: 5 }
    - { id: resource_right, kind: resource, name: 东侧资源区, center: [9, 6], active: true, intensity: 1.0, yield: 1, stock: 5 }
    # 中央高能燃料区，采集返回 +2 燃料，初始 3 块
    - { id: central_hi, kind: resource, name: 中央高能区, center: [6, 6], active: true, intensity: 1.0, yield: 2, stock: 3 }
    # 遗迹区，到达获得遗迹卡，每区 2 张
    - { id: relic_top, kind: relic, name: 上遗迹区, center: [6, 2], active: true, intensity: 1.0, relic_cards: 2 }
    - { id: relic_bottom, kind: relic, name: 下遗迹区, center: [6, 10], active: true, intensity: 1.0, relic_cards: 2 }
    # 动态灾难投放区，初始未激活，由机械臂投放后生效
    - { id: dust_area, kind: hazard, name: 月尘投放区, center: [4, 8], active: false, intensity: 0.0, dynamic: true }
    - { id: meteor_area, kind: obstacle, name: 陨石投放区, center: [8, 8], active: false, intensity: 0.0, dynamic: true }
    - { id: jam_area, kind: trap, name: 干扰投放区, center: [8, 4], active: false, intensity: 0.0, dynamic: true }

inputs:
  voice:
    enabled: true
    action_space: [move_to, collect, attack, return_base, repair, ignition_confirm, stop]
  cards:
    # 行为倾向卡：改变本回合机器人的行为权重
    - { id: collect_priority, type: behavior, name: 采集优先, effect: 本回合提高采集燃料的行为权重 }
    - { id: return_settle, type: behavior, name: 返航结算, effect: 本回合提高返回己方飞船结算的权重 }
    - { id: explore_relic, type: behavior, name: 探索遗迹, effect: 本回合提高前往遗迹区的权重，到达后获得一张遗迹卡 }
    - { id: ignition_protocol, type: behavior, name: 点火协议, effect: 燃料集满时可用，本回合极高优先级返回飞船完成点火确认 }
    - { id: moonrock_strike, type: behavior, name: 月岩炮击, effect: 机器人进入敌方飞船攻击范围时目标飞船 HP -1，目标为燃料最多者额外令其燃料 -1 }
    - { id: fuel_raid, type: behavior, name: 燃料掠夺, effect: 攻击敌方飞船成功后目标燃料 -1，自己获得一个燃料 }
    # 锦囊 / 祈愿卡
    - { id: moon_prophecy, type: gambit, name: 月相预言, effect: 查看下一次月球事件候选，可让系统重新随机一次 }
    - { id: divine_prayer, type: gambit, name: 神之祈愿, effect: 发起一次语音祈愿，月球总督依心率与战局回应 }
    - { id: emergency_shield, type: gambit, name: 紧急护盾, effect: 己方飞船获得 1 点临时护盾，持续 1 回合 }
  relic_cards:
    # 遗迹卡：强力一次性
    - { id: teleport_steal, type: relic, name: 瞬移偷窃, effect: 本回合抽走任意一名玩家的一张手牌 }
    - { id: dust_ward, type: relic, name: 月尘护符, effect: 本回合己方机器人免疫月尘效果 }
    - { id: ark_repair, type: relic, name: 核心修复, effect: 己方飞船 HP +1，最高不超过 3 }
    - { id: concurrent_ops, type: relic, name: 并发任务, effect: 本回合可连续打出行为倾向卡 }

director:
  events:
    - id: enter_boss
    - id: dust_storm
    - id: meteor_fall
    - id: central_supply
    - id: launch_jam
    - id: ignition_success
    - id: ship_crashed
    - id: betrayal
    - id: rank_locked
    - id: prayer_response
    - id: voice_command
    - id: card_input

rules:
  launch_fuel: 5
  launch_ship_hp: 1
  max_turn: 20

heartbeat:
  baseline_seconds: 30
  rage_scale: 40

arm:
  safe_mode: true
