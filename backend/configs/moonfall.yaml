  safe_mode: true
  actions:
    - drop_dust
    - move_obstacle
    - strike
    - hover_warning
    - home
    - emergency_stop

voice:
  enabled: true
  action_space:
    - move_to
    - collect
    - escort
    - avoid_and_move
    - return_base
    - stop

heartbeat:
  baseline_seconds: 30
  rage_scale: 40
